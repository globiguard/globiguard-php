name: Publish Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: json, sodium
      
      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress
      
      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          body: |
            ## Release ${{ github.ref_name }}
            
            PHP package published to Packagist.
            
            ### Installation
            ```bash
            composer require globiguard/globiguard
            ```
            
            This release is automatically indexed by Packagist.
          draft: false
          prerelease: false
      
      - name: Notify Packagist
        run: |
          curl -X POST -d 'repository_url=https://github.com/globi-explore/globiguard-php' https://packagist.org/api/update-package?username=${{ secrets.PACKAGIST_USERNAME }}&apiToken=${{ secrets.PACKAGIST_API_TOKEN }} || true
